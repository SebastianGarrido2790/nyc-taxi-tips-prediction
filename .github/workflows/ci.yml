name: Agentic CI (Brain & Brawn)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  brawn-unit-tests:
    name: 🧪 Brawn (Tools & FTI Pipelines) Unit Tests
    runs-on: ubuntu-latest
    env:
      # Dummy key so Agent configs and Pydantic schemas don't complain during testing
      GOOGLE_API_KEY: "dummy-key-for-ci-tests"
      API_URL: "http://localhost:8000"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: uv sync --all-extras --frozen

      - name: Execute Deterministic Tests (Pytest)
        run: uv run pytest --cov=src --cov-fail-under=65 --cov-report=term-missing tests/
